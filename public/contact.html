<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 — 吴乐阳</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-links">
            <a href="#" class="logo">&lt;WLY /&gt;</a>
            <ul><li><a href="index.html">首页</a></li><li><a href="portfolio.html">项目</a></li><li><a href="resume.html">简历</a></li><li><a href="#" class="active">联系</a></li></ul>
        </div>
    </nav>

    <main class="container contact-page" style="padding-top:120px;padding-bottom:80px">
        <h1 class="sec-ttl"><i class="fas fa-paper-plane"></i> 联系我</h1>
        <p style="text-align:center;color:var(--dim);margin-bottom:36px;font-size:.95rem">有任何合作、求职相关的问题，欢迎通过以下方式联系我。</p>

        <div class="ct-grid">
            <a href="mailto:wlyaaaaaa@gmail.com" class="ct-card">
                <i class="fas fa-envelope ct-icon"></i>
                <span class="ct-label">主邮箱: wlyaaaaaa@gmail.com</span>
            </a>
            <a href="mailto:1097909459@qq.com" class="ct-card">
                <i class="fas fa-envelope ct-icon"></i>
                <span class="ct-label">副邮箱: 1097909459@qq.com</span>
            </a>
            <div id="qq-card" class="ct-card"><i class="fab fa-qq ct-icon"></i><span class="ct-label">QQ: 1097909459（点击复制）</span></div>
            <a href="https://github.com/wlyaaaaaa" target="_blank" rel="noopener" class="ct-card"><i class="fab fa-github ct-icon"></i><span class="ct-label">@wlyaaaaaa / GitHub</span></a>
        </div>

        <div style="max-width:520px;margin:40px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px">
            <h3 style="font-size:1.05rem;margin-bottom:16px;color:var(--cyan)">直接发邮件</h3>
            <form id="contact-form" onsubmit="return handleSubmit(event)">
                <p style="margin-bottom:22px;font-size:.88rem;color:var(--dim)"><input type="email" id="cf-email" required placeholder="your@email.com" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:.9rem;margin-bottom:12px;outline:none"></p>
                <p style="margin-bottom:22px;font-size:.88rem;color:var(--dim)"><input type="text" id="cf-subj" placeholder="主题" required style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:.9rem;margin-bottom:12px;outline:none"></p>
                <p style="margin-bottom:18px;font-size:.88rem;color:var(--dim)"><textarea id="cf-body" rows="6" placeholder="消息内容..." required style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:.9rem;resize:none;margin-bottom:14px;outline:none"></textarea></p>
                <button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-paper-plane"></i> 发送邮件</button>
            </form>
        </div>
    </main>

    <footer class="footer"><div class="ft-inner container"><span class="ft-copy">&copy; 2026 吴乐阳 · Built with <span style="color:#e74c3c">🦞</span></span><div class="ft-links"><a href="https://github.com/wlyaaaaaa" target="_blank"><i class="fab fa-github"></i></a></div></div></footer>

    <script src="./js/main.js"></script>
    <script>
    document.getElementById('qq-card')?.addEventListener('click', function(){
        navigator.clipboard.writeText('1097909459');
        this.querySelector('.ct-label').textContent='已复制! ✅';
        setTimeout(()=>this.querySelector('.ct-label').textContent='QQ: 1097909459（点击复制）',2000);
    });
    function handleSubmit(e){
        e.preventDefault();
        let email=encodeURIComponent(document.getElementById('cf-email').value),
            subj=encodeURIComponent(document.getElementById('cf-subj').value),
            body=encodeURIComponent(document.getElementById('cf-body').value);
        window.location.href='mailto:wlyaaaaaa@gmail.com?subject='+subj+'&body='+body;
        return false;
    }
    </script>
</body>
</html>
